<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企业微信会议 Demo</title>
    <!-- Use relative paths so GitHub Pages (project pages) works under /<repo>/ -->
    <link rel="stylesheet" href="./style.css" />
    <!-- WeCom JS-SDK (latest CDN from official docs) -->
    <script src="https://wwcdn.weixin.qq.com/node/open/js/wecom-jssdk-2.3.4.js"></script>
  </head>
  <body>
    <main class="wrap">
      <h1>企业微信 H5 会议 Demo</h1>

      <section class="panel">
        <div class="row">
          <button id="btnInit">初始化 JS-SDK</button>
          <span class="hint">建议在企业微信内打开后先点一次</span>
        </div>

        <div class="row">
          <button id="btnCreate" disabled>创建会议</button>
          <button id="btnJoin" disabled>进入会议</button>
        </div>

        <div class="row">
          <label for="meetingId">会议ID（创建后自动填）</label>
          <input id="meetingId" placeholder="meetingId，或粘贴 653-533-972 这种会议号自动转换" />
        </div>

        <div class="row">
          <label for="userId">企业微信 userId（可选）</label>
          <input id="userId" placeholder="当 getContext 拿不到 userid 时手动填写，可自动记住" />
        </div>
      </section>

      <section class="panel">
        <h2>日志</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
